version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes_secret
      POSTGRES_DB: hermes_relay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_relay"]
      interval: 5s
      timeout: 5s
      retries: 5

  relay-server:
    build: ./relay-server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://hermes:hermes_secret@db:5432/hermes_relay"
      SECRET_KEY: "change-me-to-a-long-random-string-in-production"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
