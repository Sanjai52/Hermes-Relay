<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hermes Relay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .login-card h1 { font-size: 24px; color: #1a73e8; margin-bottom: 4px; }
        .login-card p { color: #65676b; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #65676b; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #dadce0; border-radius: 6px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
        .btn { width: 100%; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: #1a73e8; color: #fff; }
        .btn:hover { background: #1557b0; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #c62828; font-size: 13px; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Hermes Relay</h1>
        <p>Sign in to your relay server</p>
        <div id="error" class="error"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" id="login-btn">Sign In</button>
        </form>
        <p style="margin-top:16px;font-size:12px;color:#65676b;text-align:center;">
            Don't have an account? <a href="#" id="show-register" style="color:#1a73e8;text-decoration:none;">Register</a>
        </p>
        <div id="register-form" style="display:none;margin-top:16px;border-top:1px solid #e4e6eb;padding-top:16px;">
            <form id="register-form-inner">
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn" id="register-btn">Create Account</button>
            </form>
        </div>
    </div>
    <script>
        const API = window.location.origin;

        // Show/hide register form
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            const el = document.getElementById('register-form');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            document.getElementById('error').style.display = 'none';

            try {
                const res = await fetch(API + '/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    showError(data.detail || 'Login failed');
                }
            } catch (err) {
                showError('Connection failed');
            }
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });

        // Register
        document.getElementById('register-form-inner').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';
            document.getElementById('error').style.display = 'none';

            try {
                const res = await fetch(API + '/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('reg-email').value, password: document.getElementById('reg-password').value })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    showError(data.detail || 'Registration failed');
                }
            } catch (err) {
                showError('Connection failed');
            }
            btn.disabled = false;
            btn.textContent = 'Create Account';
        });

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
