<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Hermes Relay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ece0d1; color: #634832; min-height: 100vh; }
        a { color: #38220f; text-decoration: none; }
        .layout { display: flex; min-height: 100vh; }

        .sidebar { width: 240px; background: #dbc1ac; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(99,72,50,0.15); }
        .sidebar-header h2 { font-size: 18px; color: #38220f; }
        .sidebar nav { flex: 1; padding: 8px 0; }
        .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: #634832; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar nav a:hover, .sidebar nav a.active { background: #634832; color: #ece0d1; border-left-color: #38220f; }
        .sidebar nav a .icon { width: 20px; height: 20px; flex-shrink: 0; }
        .sidebar nav a .icon svg { width: 20px; height: 20px; fill: currentColor; }
        .sidebar-footer { padding: 12px 0; border-top: 1px solid rgba(99,72,50,0.15); }
        .sidebar-footer a { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: #634832; font-size: 14px; transition: all 0.2s; }
        .sidebar-footer a:hover { background: #634832; color: #ece0d1; }
        .sidebar-footer a .icon { width: 20px; height: 20px; flex-shrink: 0; }
        .sidebar-footer a .icon svg { width: 20px; height: 20px; fill: currentColor; }

        .main { flex: 1; padding: 32px; background: #ece0d1; overflow-x: hidden; }
        .topbar { display: none; align-items: center; gap: 12px; padding: 12px 16px; background: #dbc1ac; position: sticky; top: 0; z-index: 100; }
        .topbar .menu-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .topbar .menu-btn svg { width: 24px; height: 24px; fill: #38220f; }
        .topbar h2 { font-size: 16px; color: #38220f; flex: 1; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(56,34,15,0.4); z-index: 200; }

        .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 3px rgba(56,34,15,0.08); margin-bottom: 20px; }
        .card h3 { font-size: 14px; color: #967259; margin-bottom: 4px; }
        .card .value { font-size: 28px; font-weight: 700; color: #38220f; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #dbc1ac; font-size: 14px; white-space: nowrap; }
        th { color: #967259; font-weight: 600; }
        td { color: #634832; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-online, .badge-sent, .badge-accepted, .badge-delivered { background: rgba(56,34,15,0.08); color: #38220f; }
        .badge-offline, .badge-failed { background: rgba(192,57,43,0.08); color: #c0392b; }
        .badge-pending { background: rgba(255,159,10,0.12); color: #b8860b; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: #38220f; color: #ece0d1; }
        .btn-primary:hover { background: #634832; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-outline { background: transparent; border: 1px solid #967259; color: #634832; }
        .btn-outline:hover { background: rgba(56,34,15,0.06); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #634832; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #dbc1ac; border-radius: 6px; font-size: 14px; outline: none; background: #fff; color: #634832; }
        .form-group input:focus { border-color: #38220f; box-shadow: 0 0 0 2px rgba(56,34,15,0.1); }
        .form-group input::placeholder { color: #967259; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast-success { background: #38220f; color: #ece0d1; }
        .toast-error { background: #c0392b; }
        .copy-input { display: flex; gap: 8px; }
        .copy-input input { flex: 1; background: #fff; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(56,34,15,0.5); z-index: 999; }
        .modal-overlay.show { display: flex; align-items: center; justify-content: center; padding: 16px; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 480px; width: 100%; box-shadow: 0 4px 12px rgba(56,34,15,0.15); }
        .modal h3 { margin-bottom: 16px; color: #38220f; }

        @media (max-width: 767px) {
            .topbar { display: flex; }
            .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; z-index: 300; transition: left 0.25s ease; }
            .sidebar.open { left: 0; }
            .sidebar-overlay.open { display: block; }
            .main { padding: 16px; }
            .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .card { padding: 16px; }
            .card .value { font-size: 22px; }
            table { min-width: 400px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="2" rx="1"/><rect x="3" y="11" width="18" height="2" rx="1"/><rect x="3" y="17" width="18" height="2" rx="1"/></svg>
        </button>
        <h2>Hermes Relay</h2>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Hermes Relay</h2>
            </div>
            <nav>
                <a href="/dashboard" class="nav-link" data-page="dashboard">
                    <span class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="4" rx="1"/><rect x="13" y="9" width="8" height="12" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/></svg></span>
                    <span>Dashboard</span>
                </a>
                <a href="/history" class="nav-link" data-page="history">
                    <span class="icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h10v2H7zm0 3h7v2H7z"/></svg></span>
                    <span>SMS History</span>
                </a>
                <a href="/keys" class="nav-link" data-page="keys">
                    <span class="icon"><svg viewBox="0 0 24 24"><path d="M12.65 10a6 6 0 1 0 0 2H21v2h2v-4h-2v2h-2v-2h-2v2h-4.35zM5 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg></span>
                    <span>API Keys</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn">
                    <span class="icon"><svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg></span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>
        <div class="main">
            {% block content %}{% endblock %}
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        const page = window.location.pathname.split('/')[1] || 'dashboard';
        document.querySelectorAll('.nav-link').forEach(a => {
            if (a.dataset.page === page) a.classList.add('active');
        });

        document.querySelectorAll('#menu-btn, #sidebar-overlay').forEach(el => {
            el.addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('sidebar-overlay').classList.toggle('open');
            });
        });

        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/';
        });

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast toast-${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        const token = localStorage.getItem('token');
        if (!token && window.location.pathname !== '/') window.location.href = '/';
    </script>
</body>
</html>
